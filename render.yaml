services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: phishing-detector-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install uv
      cd backend && uv sync --frozen --no-dev
    startCommand: cd backend && .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
    healthCheckPath: /api/samples

  # ── Frontend (static site) ───────────────────────────────────────────────────
  - type: web
    name: phishing-detector-ui
    runtime: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      # Proxy /api/* to the backend service
      - type: rewrite
        source: /api/*
        destination: https://phishing-detector-api.onrender.com/api/:splat
      # SPA fallback
      - type: rewrite
        source: /*
        destination: /index.html
